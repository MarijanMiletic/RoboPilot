# UR10e Robot Configuration
# Reference: Universal Robots UR10e Technical Specifications

robot:
  model: "UR10e"
  manufacturer: "Universal Robots"
  dof: 6
  payload_max: 12.5  # kg
  reach: 1.300  # meters
  weight: 33.5  # kg
  repeatability: 0.05  # mm

  joints:
    - name: "shoulder_pan_joint"
      type: "revolute"
      limits:
        lower: -6.2832  # -2*pi rad
        upper: 6.2832   # 2*pi rad
        velocity: 2.0944  # rad/s (120 deg/s)
        effort: 330.0     # Nm
      home_position: 0.0

    - name: "shoulder_lift_joint"
      type: "revolute"
      limits:
        lower: -6.2832
        upper: 6.2832
        velocity: 2.0944
        effort: 330.0
      home_position: -1.5708  # -90 deg

    - name: "elbow_joint"
      type: "revolute"
      limits:
        lower: -3.1416  # -pi rad
        upper: 3.1416
        velocity: 3.1416  # rad/s (180 deg/s)
        effort: 150.0
      home_position: 1.5708  # 90 deg

    - name: "wrist_1_joint"
      type: "revolute"
      limits:
        lower: -6.2832
        upper: 6.2832
        velocity: 3.1416
        effort: 56.0
      home_position: -1.5708

    - name: "wrist_2_joint"
      type: "revolute"
      limits:
        lower: -6.2832
        upper: 6.2832
        velocity: 3.1416
        effort: 56.0
      home_position: 0.0

    - name: "wrist_3_joint"
      type: "revolute"
      limits:
        lower: -6.2832
        upper: 6.2832
        velocity: 3.1416
        effort: 56.0
      home_position: 0.0

  named_positions:
    home:
      description: "Default home position — arm upright"
      joint_values: [0.0, -1.5708, 1.5708, -1.5708, 0.0, 0.0]
    ready:
      description: "Ready position — arm extended forward"
      joint_values: [0.0, -1.2, 1.4, -1.7708, -1.5708, 0.0]
    pick_approach:
      description: "Approach position above input conveyor"
      joint_values: [1.0472, -1.0472, 1.5708, -2.0944, -1.5708, 0.0]
    place_approach:
      description: "Approach position above output conveyor"
      joint_values: [-1.0472, -1.0472, 1.5708, -2.0944, -1.5708, 0.0]
    inspection:
      description: "Position above inspection station"
      joint_values: [0.0, -0.7854, 1.5708, -2.3562, -1.5708, 0.0]

  gripper:
    model: "Robotiq 2F-85"
    type: "parallel_jaw"
    stroke: 0.085  # meters (85mm)
    force_range: [20, 235]  # Newtons
    speed: 0.15  # m/s
    default_force: 100  # N
    open_position: 0.085
    closed_position: 0.0
    topic: "/gripper_controller/command"

  controller:
    type: "joint_trajectory_controller"
    joints_topic: "/joint_states"
    command_topic: "/joint_trajectory_controller/joint_trajectory"
    move_group: "ur_manipulator"
    planning_frame: "base_link"
    end_effector_link: "tool0"
    planning_time: 5.0  # seconds
    max_velocity_scaling: 1.0
    max_acceleration_scaling: 1.0

  workspace_bounds:
    x: [-1.3, 1.3]
    y: [-1.3, 1.3]
    z: [0.0, 2.2]
